<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADELEVATE ADS AGENCY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:#050505;
overflow:hidden;
position:relative;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:#2563eb;
filter:blur(180px);
opacity:.25;
top:-150px;
left:-150px;
border-radius:50%;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:#7c3aed;
filter:blur(180px);
opacity:.25;
bottom:-150px;
right:-150px;
border-radius:50%;
}

.card{
width:100%;
max-width:390px;
position:relative;
}

.glow{
position:absolute;
inset:-2px;
border-radius:32px;
background:linear-gradient(
135deg,
#3b82f6,
#8b5cf6,
#06b6d4
);
filter:blur(15px);
opacity:.8;
}

.content{
position:relative;
background:rgba(10,10,10,.92);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
padding:24px;
text-align:center;
overflow:hidden;
}

.logo{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,.08);
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.badge{
display:inline-block;
margin-top:14px;
padding:8px 14px;
border-radius:999px;
font-size:12px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
color:#d4d4d8;
}

h1{
margin-top:18px;
font-size:30px;
font-weight:800;
color:white;
line-height:1.1;
}

.gradient{
display:block;
background:linear-gradient(
90deg,
#60a5fa,
#a78bfa,
#22d3ee
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{
margin-top:16px;
font-size:14px;
line-height:1.6;
color:#a1a1aa;
}

.desc span{
color:white;
font-weight:600;
}

.services{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:22px;
}

.service{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:14px;
}

.service .icon{
font-size:22px;
}

.service p{
color:white;
font-size:12px;
font-weight:600;
margin-top:6px;
}

.join-btn{
display:block;
margin-top:22px;
text-decoration:none;
}

.join-btn button{
width:100%;
border:none;
cursor:pointer;
padding:16px;
border-radius:18px;
font-size:15px;
font-weight:800;
color:white;
background:linear-gradient(
135deg,
#2563eb,
#7c3aed,
#06b6d4
);
box-shadow:
0 10px 40px rgba(59,130,246,.4);
transition:.25s;
}

.join-btn button:hover{
transform:translateY(-2px);
}

.footer{
margin-top:14px;
font-size:11px;
color:#71717a;
}

.shine{
position:absolute;
top:-100%;
left:-50%;
width:80px;
height:250%;
background:rgba(255,255,255,.08);
transform:rotate(25deg);
animation:shine 5s linear infinite;
}

@keyframes shine{
100%{
left:140%;
}
}
</style>
</head>

<body>

<div class="card">

<div class="glow"></div>

<div class="content">

<div class="shine"></div>

<img
src="IMG_20260616_124014_949.webp"
alt="ADELEVATE ADS AGENCY"
class="logo"
>

<div class="badge">
Premium Telegram Marketing Agency
</div>

<h1>
ADELEVATE
<span class="gradient">
ADS AGENCY
</span>
</h1>

<p class="desc">
Premium Telegram promotions for
<span>Stock Market</span>,
<span>Cricket Prediction</span>,
<span>Colour Trading</span> &
<span>Forex Trading</span>.
</p>

<div class="services">

<div class="service">
<div class="icon">📈</div>
<p>Stock Market</p>
</div>

<div class="service">
<div class="icon">🏏</div>
<p>Cricket Tips</p>
</div>

<div class="service">
<div class="icon">🎨</div>
<p>Colour Trading</p>
</div>

<div class="service">
<div class="icon">💹</div>
<p>Forex Trading</p>
</div>

</div>

<a
class="join-btn"
href="https://t.me/+U_dceVTrTsFjYTU1"
target="_blank"
>

<button>
🚀 JOIN TELEGRAM CHANNEL
</button>

</a>

<div class="footer">
Trusted Promotion • Fast Growth • Premium Reach
</div>

</div>
</div>

</body>
</html>
