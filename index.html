<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ADELEVATE ADS AGENCY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
background:#06070b;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
top:-200px;
left:-200px;
background:#2563eb;
filter:blur(180px);
opacity:.18;
border-radius:50%;
}

body::after{
content:"";
position:fixed;
width:500px;
height:500px;
bottom:-200px;
right:-200px;
background:#7c3aed;
filter:blur(180px);
opacity:.18;
border-radius:50%;
}

.card{
width:min(92vw,390px);
aspect-ratio:3/4;
position:relative;
}

.card::before{
content:"";
position:absolute;
inset:-1px;
border-radius:30px;
background:linear-gradient(
135deg,
rgba(59,130,246,.6),
rgba(124,58,237,.4),
rgba(6,182,212,.5)
);
filter:blur(12px);
opacity:.75;
}

.content{
position:relative;
height:100%;
background:#0c0d12;
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
padding:22px;
display:flex;
flex-direction:column;
justify-content:space-between;
text-align:center;
}

.badge{
display:inline-flex;
align-items:center;
justify-content:center;
margin:auto;
padding:8px 16px;
border-radius:999px;
font-size:11px;
font-weight:600;
color:#d4d4d8;
background:#151822;
border:1px solid rgba(255,255,255,.08);
}

.logo-wrap{
position:relative;
width:95px;
height:95px;
margin:18px auto 0;
}

.logo-glow{
position:absolute;
inset:-10px;
background:linear-gradient(
135deg,
#2563eb,
#7c3aed,
#06b6d4
);
border-radius:50%;
filter:blur(18px);
opacity:.7;
}

.logo{
position:relative;
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,.08);
}

.agency-title{
margin-top:16px;
font-size:22px;
font-weight:800;
letter-spacing:.3px;
color:#ffffff;
}

.desc{
margin-top:12px;
font-size:13px;
line-height:1.6;
color:#9ca3af;
}

.desc span{
color:#ffffff;
font-weight:600;
}

.services{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.service{
background:#131722;
border:1px solid rgba(255,255,255,.06);
border-radius:16px;
padding:12px;
}

.service .icon{
font-size:20px;
}

.service p{
margin-top:5px;
font-size:11px;
font-weight:600;
color:#ffffff;
}

.join-btn{
display:block;
text-decoration:none;
margin-top:18px;
}

.join-btn button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:15px;
font-weight:800;
cursor:pointer;
color:white;
background:linear-gradient(
90deg,
#2563eb,
#7c3aed
);
box-shadow:
0 10px 30px rgba(37,99,235,.35);
transition:.25s;
}

.join-btn button:hover{
transform:translateY(-2px);
}

.footer{
margin-top:12px;
font-size:11px;
color:#6b7280;
}

@media(max-width:400px){

.agency-title{
font-size:20px;
}

.desc{
font-size:12px;
}

}

</style>
</head>
<body>

<div class="card">

<div class="content">

<div>

<div class="badge">
Premium Telegram Marketing Agency
</div>

<div class="logo-wrap">
<div class="logo-glow"></div>

<img
src="IMG_20260616_124014_949.webp"
alt="ADELEVATE ADS AGENCY"
class="logo">
</div>

<h1 class="agency-title">
ADELEVATE ADS AGENCY
</h1>

<p class="desc">
Premium Telegram promotions for
<span>Stock Market</span>,
<span>Cricket Prediction</span>,
<span>Colour Trading</span>
&
<span>Forex Trading</span>.
</p>

<div class="services">

<div class="service">
<div class="icon">📈</div>
<p>Stock Market</p>
</div>

<div class="service">
<div class="icon">🏏</div>
<p>Cricket Prediction</p>
</div>

<div class="service">
<div class="icon">🎨</div>
<p>Colour Trading</p>
</div>

<div class="service">
<div class="icon">💹</div>
<p>Forex Trading</p>
</div>

</div>

</div>

<div>

<a
href="https://t.me/+U_dceVTrTsFjYTU1"
target="_blank"
class="join-btn">

<button>
🚀 JOIN TELEGRAM CHANNEL
</button>

</a>

<div class="footer">
Trusted Promotion • Fast Growth • Premium Reach
</div>

</div>

</div>

</div>

</body>
</html>
