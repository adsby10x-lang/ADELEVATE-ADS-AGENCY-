<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADELEVATE ADS AGENCY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top left,#1d4ed820 0%,transparent 40%),
radial-gradient(circle at bottom right,#7c3aed20 0%,transparent 40%),
#06070b;
overflow:hidden;
}

.card{
width:min(92vw,400px);
aspect-ratio:3/4;
position:relative;
}

.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:30px;
background:linear-gradient(
135deg,
rgba(59,130,246,.55),
rgba(124,58,237,.45),
rgba(6,182,212,.45)
);
filter:blur(14px);
opacity:.8;
}

.content{
position:relative;
height:100%;
background:#0d1117;
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
padding:22px;
display:flex;
flex-direction:column;
justify-content:space-between;
text-align:center;
}

.badge{
display:inline-flex;
align-items:center;
justify-content:center;
padding:8px 16px;
border-radius:999px;
font-size:11px;
font-weight:600;
color:#d1d5db;
background:#151a23;
border:1px solid rgba(255,255,255,.08);
margin:auto;
}

.logo-wrap{
position:relative;
width:100px;
height:100px;
margin:18px auto 0;
}

.logo-glow{
position:absolute;
inset:-10px;
border-radius:50%;
background:linear-gradient(
135deg,
#2563eb,
#7c3aed,
#06b6d4
);
filter:blur(18px);
opacity:.75;
}

.logo{
position:relative;
width:100px;
height:100px;
object-fit:cover;
border-radius:50%;
border:4px solid rgba(255,255,255,.08);
}

.agency-title{
margin-top:16px;
font-size:22px;
font-weight:800;
color:#fff;
letter-spacing:.4px;
}

.tagline{
margin-top:10px;
font-size:14px;
font-weight:600;
font-style:italic;
color:#9ca3af;
letter-spacing:.2px;
}

.services{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:22px;
}

.service{
background:#131a24;
border:1px solid rgba(255,255,255,.06);
border-radius:16px;
padding:12px 8px;
}

.service .icon{
font-size:20px;
margin-bottom:5px;
}

.service p{
font-size:11px;
font-weight:600;
line-height:1.4;
color:white;
}

.join-btn{
display:block;
margin-top:18px;
text-decoration:none;
}

.join-btn button{
width:100%;
border:none;
cursor:pointer;
padding:16px;
border-radius:18px;
font-size:15px;
font-weight:800;
color:white;
background:linear-gradient(
90deg,
#2563eb,
#7c3aed
);
box-shadow:0 10px 30px rgba(37,99,235,.35);
transition:.25s;
}

.join-btn button:hover{
transform:translateY(-2px);
}

.footer{
margin-top:12px;
font-size:11px;
color:#6b7280;
}

@media(max-width:400px){

.agency-title{
font-size:20px;
}

.tagline{
font-size:13px;
}

.service p{
font-size:10px;
}

}

</style>
</head>
<body>

<div class="card">

<div class="content">

<div>

<div class="badge">
Premium Telegram Marketing Agency
</div>

<div class="logo-wrap">
<div class="logo-glow"></div>

<img
src="IMG_20260616_124014_949.webp"
alt="ADELEVATE ADS AGENCY"
class="logo">
</div>

<h1 class="agency-title">
ADELEVATE ADS AGENCY
</h1>

<p class="tagline">
We Run Ads For Professionals
</p>

<div class="services">

<div class="service">
<div class="icon">🏏</div>
<p>Cricket Betting<br>/ Fantasy</p>
</div>

<div class="service">
<div class="icon">📈</div>
<p>Stock Market</p>
</div>

<div class="service">
<div class="icon">💹</div>
<p>Binary & Forex<br>Trading</p>
</div>

<div class="service">
<div class="icon">🎨</div>
<p>Colour Trading</p>
</div>

<div class="service" style="grid-column:1/3;">
<div class="icon">🚀</div>
<p>Other Businesses</p>
</div>

</div>

</div>

<div>

<a
href="https://t.me/+U_dceVTrTsFjYTU1"
target="_blank"
class="join-btn">

<button>
🚀 JOIN TELEGRAM CHANNEL
</button>

</a>

<div class="footer">
Trusted Promotion • Fast Growth • Premium Reach
</div>

</div>

</div>

</div>

</body>
</html>
